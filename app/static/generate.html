<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成图片 — GeminiGen</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .drop-zone { border: 2px dashed #d1d5db; transition: all .2s; }
  .drop-zone.drag-over { border-color: #7c3aed; background: #f5f3ff; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.4); border-top-color: white; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #7c3aed; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
</style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

<!-- 导航 -->
<nav class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-4">
    <a href="/" class="flex items-center gap-2">
      <div class="w-8 h-8 gradient-bg rounded-lg flex items-center justify-center">
        <span class="text-white font-bold text-sm">G</span>
      </div>
      <span class="font-bold text-gray-800">GeminiGen</span>
    </a>
    <span class="text-gray-300">/</span>
    <span class="text-gray-600 text-sm">生成图片</span>
  </div>
  <div class="flex items-center gap-4">
    <span class="text-sm text-gray-600">余额: <span id="balanceDisplay" class="font-bold text-purple-700">加载中...</span></span>
    <a href="/dashboard" class="text-sm text-purple-600 hover:underline">控制台</a>
  </div>
</nav>

<!-- 未登录提示 -->
<div id="loginPrompt" class="hidden max-w-lg mx-auto mt-20 bg-white rounded-2xl shadow-md p-10 text-center">
  <div class="text-5xl mb-4">🔐</div>
  <h2 class="text-xl font-bold text-gray-800 mb-2">请先登录</h2>
  <p class="text-gray-500 mb-6">前往控制台登录或注册账号</p>
  <a href="/dashboard" class="gradient-bg text-white px-8 py-3 rounded-xl font-medium hover:opacity-90 transition inline-block">去登录</a>
</div>

<!-- 主内容 -->
<div id="mainContent" class="hidden max-w-4xl mx-auto py-10 px-6">
  <div class="grid md:grid-cols-2 gap-8">

    <!-- 左：输入区 -->
    <div class="space-y-6">
      <h1 class="text-2xl font-bold text-gray-800">AI 图片生成</h1>

      <!-- 选模型 -->
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <label class="block text-sm font-semibold text-gray-700 mb-3">选择模型</label>
        <div class="grid grid-cols-2 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="model" value="nano-banana-2" checked class="sr-only peer">
            <div class="border-2 border-gray-200 rounded-xl p-3 peer-checked:border-purple-500 peer-checked:bg-purple-50 transition">
              <div class="font-semibold text-gray-800 text-sm">nano-banana-2</div>
              <div class="text-purple-600 font-bold">¥0.05</div>
              <div class="text-xs text-gray-400">标准版</div>
            </div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="model" value="nano-banana-pro" class="sr-only peer">
            <div class="border-2 border-gray-200 rounded-xl p-3 peer-checked:border-purple-500 peer-checked:bg-purple-50 transition relative">
              <div class="absolute -top-2 right-2 bg-purple-600 text-white text-xs px-2 rounded-full">推荐</div>
              <div class="font-semibold text-gray-800 text-sm">nano-banana-pro</div>
              <div class="text-purple-600 font-bold">¥0.06</div>
              <div class="text-xs text-gray-400">专业版</div>
            </div>
          </label>
        </div>
      </div>

      <!-- 商品图上传 -->
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <label class="block text-sm font-semibold text-gray-700 mb-3">商品图 <span class="text-red-500">*</span></label>
        <div id="dropZone" class="drop-zone rounded-xl p-8 text-center cursor-pointer hover:border-purple-400 transition"
             onclick="document.getElementById('fileInput').click()"
             ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
          <div id="dropPlaceholder">
            <div class="text-4xl mb-3">🖼️</div>
            <div class="text-gray-500 text-sm">点击选择或拖拽图片</div>
            <div class="text-gray-400 text-xs mt-1">支持 JPG / PNG / WEBP</div>
          </div>
          <img id="previewImg" class="hidden mx-auto max-h-40 rounded-xl object-contain" alt="预览">
        </div>
        <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="onFileSelect(event)">
      </div>

      <!-- 或输入图片URL -->
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <label class="block text-sm font-semibold text-gray-700 mb-3">或输入商品图 URL</label>
        <input type="url" id="imageUrl" placeholder="https://example.com/product.jpg"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300">
        <div class="text-xs text-gray-400 mt-1">上传文件或填写URL，两者选其一</div>
      </div>

      <!-- 生成按钮 -->
      <button id="generateBtn" onclick="startGenerate()"
              class="w-full gradient-bg text-white py-3.5 rounded-xl font-bold text-base hover:opacity-90 transition flex items-center justify-center gap-2">
        <span id="btnText">✨ 开始生成</span>
        <span id="btnSpinner" class="spinner hidden"></span>
      </button>
    </div>

    <!-- 右：结果区 -->
    <div class="space-y-6">
      <h2 class="text-2xl font-bold text-gray-800">生成结果</h2>

      <!-- 等待态 -->
      <div id="statusCard" class="hidden bg-white rounded-2xl p-8 shadow-sm text-center">
        <div class="flex items-center justify-center gap-2 mb-4">
          <div class="pulse-dot"></div>
          <div class="pulse-dot" style="animation-delay:.2s"></div>
          <div class="pulse-dot" style="animation-delay:.4s"></div>
        </div>
        <div id="statusText" class="text-gray-600 font-medium">任务已提交，等待处理...</div>
        <div id="taskIdText" class="text-xs text-gray-400 mt-2 font-mono"></div>
        <div class="mt-4 text-sm text-gray-400">通常 1-3 分钟完成</div>
      </div>

      <!-- 成功态 -->
      <div id="successCard" class="hidden bg-white rounded-2xl p-6 shadow-sm">
        <div class="text-green-600 font-semibold mb-3 flex items-center gap-2">
          <span>✅</span> 生成成功
        </div>
        <img id="resultImg" class="w-full rounded-xl object-contain max-h-80" alt="生成结果">
        <div class="flex gap-3 mt-4">
          <a id="downloadBtn" href="#" download="geminigen_result.png" target="_blank"
             class="flex-1 text-center border-2 border-purple-600 text-purple-600 rounded-xl py-2 text-sm font-medium hover:bg-purple-50 transition">
            下载图片
          </a>
          <button onclick="resetForm()" class="flex-1 gradient-bg text-white rounded-xl py-2 text-sm font-medium hover:opacity-90 transition">
            再次生成
          </button>
        </div>
      </div>

      <!-- 失败态 -->
      <div id="failCard" class="hidden bg-white rounded-2xl p-6 shadow-sm">
        <div class="text-red-500 font-semibold mb-2 flex items-center gap-2"><span>❌</span> 生成失败</div>
        <div id="failMsg" class="text-gray-600 text-sm"></div>
        <div class="text-xs text-gray-400 mt-2">费用已退回账户</div>
        <button onclick="resetForm()" class="mt-4 w-full border border-gray-200 rounded-xl py-2 text-sm hover:bg-gray-50 transition">重新尝试</button>
      </div>

      <!-- 空态 -->
      <div id="emptyCard" class="bg-white rounded-2xl p-10 shadow-sm text-center text-gray-400">
        <div class="text-5xl mb-4">🎨</div>
        <div>上传商品图后点击生成<br>AI 将自动选择场景合成仓库风格图</div>
      </div>

      <!-- 历史小记 -->
      <div id="recentTasks" class="bg-white rounded-2xl p-5 shadow-sm">
        <div class="font-semibold text-gray-700 mb-3 text-sm">最近任务</div>
        <div id="recentList" class="space-y-2 text-sm text-gray-500">加载中...</div>
      </div>
    </div>

  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('gg_token');
let pollTimer = null;

// ── 初始化 ────────────────────────────────────────────────────
window.onload = async () => {
  if (!token) {
    document.getElementById('loginPrompt').classList.remove('hidden');
    return;
  }
  try {
    const user = await apiFetch('/auth/me');
    document.getElementById('balanceDisplay').textContent = '¥' + user.balance.toFixed(4);
    document.getElementById('mainContent').classList.remove('hidden');
    loadRecentTasks();
  } catch {
    document.getElementById('loginPrompt').classList.remove('hidden');
  }
};

// ── 拖拽 ──────────────────────────────────────────────────────
function dragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function dragLeave(e) { document.getElementById('dropZone').classList.remove('drag-over'); }
function dropFile(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
}

function onFileSelect(e) {
  const file = e.target.files[0];
  if (file) setFile(file);
}

function setFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('dropPlaceholder').classList.add('hidden');
    const img = document.getElementById('previewImg');
    img.src = e.target.result;
    img.classList.remove('hidden');
    document.getElementById('imageUrl').value = '';
  };
  reader.readAsDataURL(file);
}

// ── 生成 ──────────────────────────────────────────────────────
async function startGenerate() {
  const model = document.querySelector('input[name="model"]:checked').value;
  const imageUrl = document.getElementById('imageUrl').value.trim();
  const fileInput = document.getElementById('fileInput');
  const hasFile = fileInput.files && fileInput.files[0];

  if (!imageUrl && !hasFile) {
    alert('请上传商品图或输入图片 URL');
    return;
  }

  setBtnLoading(true);
  showCard('status');

  try {
    let task;
    if (hasFile) {
      // 文件上传方式
      const formData = new FormData();
      formData.append('product_image', fileInput.files[0]);
      formData.append('model', model);
      const res = await fetch('/v1/generate/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData,
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || '提交失败');
      }
      task = await res.json();
    } else {
      // URL 方式
      task = await apiFetch('/v1/generate', 'POST', {
        product_image_url: imageUrl,
        model,
      });
    }

    document.getElementById('taskIdText').textContent = 'Task ID: ' + task.task_id;
    document.getElementById('statusText').textContent = '任务已提交，等待处理...';
    setBtnLoading(false);
    startPolling(task.task_id);

  } catch (e) {
    setBtnLoading(false);
    showCard('fail');
    document.getElementById('failMsg').textContent = e.message;
  }
}

function startPolling(taskId) {
  let attempts = 0;
  pollTimer = setInterval(async () => {
    attempts++;
    try {
      const task = await apiFetch('/v1/tasks/' + taskId);
      if (task.status === 'processing') {
        document.getElementById('statusText').textContent = `处理中... (${attempts * 5}s)`;
      } else if (task.status === 'success') {
        clearInterval(pollTimer);
        showCard('success');
        document.getElementById('resultImg').src = task.result_image_url;
        document.getElementById('downloadBtn').href = task.result_image_url;
        // 更新余额
        try {
          const user = await apiFetch('/auth/me');
          document.getElementById('balanceDisplay').textContent = '¥' + user.balance.toFixed(4);
        } catch {}
        loadRecentTasks();
      } else if (task.status === 'failed') {
        clearInterval(pollTimer);
        showCard('fail');
        document.getElementById('failMsg').textContent = task.error_msg || '生成失败';
      }
      if (attempts > 120) {  // 10分钟超时
        clearInterval(pollTimer);
        showCard('fail');
        document.getElementById('failMsg').textContent = '等待超时，请刷新页面查看任务状态';
      }
    } catch {}
  }, 5000);
}

function showCard(name) {
  ['status','success','fail','empty'].forEach(c => {
    document.getElementById(c + 'Card').classList.toggle('hidden', c !== name);
  });
}

function setBtnLoading(loading) {
  document.getElementById('generateBtn').disabled = loading;
  document.getElementById('btnSpinner').classList.toggle('hidden', !loading);
  document.getElementById('btnText').textContent = loading ? '生成中...' : '✨ 开始生成';
}

function resetForm() {
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('fileInput').value = '';
  document.getElementById('previewImg').classList.add('hidden');
  document.getElementById('dropPlaceholder').classList.remove('hidden');
  document.getElementById('imageUrl').value = '';
  showCard('empty');
  setBtnLoading(false);
}

// ── 最近任务 ──────────────────────────────────────────────────
async function loadRecentTasks() {
  try {
    const tasks = await apiFetch('/v1/tasks?limit=5');
    const el = document.getElementById('recentList');
    if (!tasks.length) { el.innerHTML = '<div class="text-gray-400">暂无记录</div>'; return; }
    const statusMap = { pending:'⏳', processing:'🔄', success:'✅', failed:'❌' };
    el.innerHTML = tasks.map(t => `
      <div class="flex items-center justify-between py-1.5 border-b border-gray-50 last:border-0">
        <div class="flex items-center gap-2">
          <span>${statusMap[t.status]||'?'}</span>
          <span class="font-mono text-xs text-gray-400">${t.task_id.substring(0,8)}</span>
          <span class="text-gray-600">${t.model}</span>
        </div>
        <div>${t.result_image_url ? `<a href="${t.result_image_url}" target="_blank" class="text-purple-500 hover:underline text-xs">查看</a>` : ''}</div>
      </div>
    `).join('');
  } catch {
    document.getElementById('recentList').innerHTML = '<div class="text-gray-400">加载失败</div>';
  }
}

// ── API Helper ────────────────────────────────────────────────
async function apiFetch(path, method = 'GET', body = null) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
  const res = await fetch(API + path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}
</script>
</body>
</html>
