<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>控制台 — GeminiGen</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #000000;
  --surface: #111111;
  --surf2:   #1a1a1a;
  --surf3:   #222222;
  --border:  rgba(255,255,255,0.10);
  --border2: rgba(255,255,255,0.06);
  --text:    #f5f5f7;
  --text2:   #a1a1a6;
  --text3:   #636366;
  --accent:  #f97316;
  --accent2: #ea6e10;
  --green:   #34c759;
  --red:     #ff453a;
  --blue:    #0a84ff;
  --yellow:  #ffd60a;
  --font:    -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
}

html, body { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Auth modal ──────────────────────────────────────────── */
.auth-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 20px;
}

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  width: 100%; max-width: 400px;
}

.auth-logo {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  margin-bottom: 32px;
}
.auth-logo-icon {
  width: 44px; height: 44px;
  background: var(--accent);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 18px; color: #fff;
}
.auth-logo-name {
  font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text);
}
.auth-logo-sub {
  font-size: 13px; color: var(--text2); text-align: center;
}

/* Tabs */
.auth-tabs {
  display: flex;
  background: var(--surf2);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 24px;
}

.auth-tab {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  font-size: 13px; font-weight: 600; font-family: var(--font);
  cursor: pointer; border: none;
  background: transparent; color: var(--text2);
  transition: all .2s;
}
.auth-tab.active {
  background: var(--surf3);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,.4);
}

/* Form inputs */
.auth-input {
  width: 100%;
  background: var(--surf2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px; font-family: var(--font);
  color: var(--text);
  transition: border-color .2s;
  margin-bottom: 12px;
  display: block;
}
.auth-input::placeholder { color: var(--text3); }
.auth-input:focus { outline: none; border-color: rgba(255,255,255,.3); }

.auth-submit {
  width: 100%;
  background: var(--accent);
  color: #fff; border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 14px; font-weight: 600; font-family: var(--font);
  cursor: pointer; margin-top: 4px;
  transition: background .2s;
}
.auth-submit:hover { background: var(--accent2); }

.auth-error {
  font-size: 13px; color: var(--red);
  text-align: center; margin-top: 12px;
  min-height: 18px;
}

/* ── App layout ──────────────────────────────────────────── */
.app {
  display: flex;
  height: 100vh;
}

/* Header */
.app-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
}

.header-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.header-logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff;
}
.header-logo-name { font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: -0.3px; }

.header-right {
  display: flex; align-items: center; gap: 20px;
}

.header-balance {
  font-size: 13px; color: var(--text2);
}
.header-balance strong { color: var(--text); font-weight: 600; }

.btn-logout {
  background: transparent; border: none;
  font-size: 13px; color: var(--text3);
  cursor: pointer; font-family: var(--font);
  transition: color .2s; padding: 0;
}
.btn-logout:hover { color: var(--red); }

/* Sidebar */
.sidebar {
  width: 220px; min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 68px 12px 20px;
  display: flex; flex-direction: column;
  position: fixed; top: 0; bottom: 0; left: 0;
  z-index: 50;
}

.sidebar-nav {
  display: flex; flex-direction: column; gap: 2px;
  flex: 1;
}

.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: 9px;
  font-size: 13px; font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  text-decoration: none;
  transition: all .15s;
  border: none; background: transparent; font-family: var(--font);
  width: 100%; text-align: left;
}
.sidebar-item:hover { background: var(--surf2); color: var(--text); }
.sidebar-item.active { background: var(--surf2); color: var(--text); }

.sidebar-item svg { width: 16px; height: 16px; flex-shrink: 0; }

/* Main content */
.main-content {
  flex: 1;
  padding: 68px 0 0 220px;
  overflow-y: auto;
  height: 100vh;
  scrollbar-width: thin;
  scrollbar-color: var(--surf3) transparent;
}
.main-content::-webkit-scrollbar { width: 4px; }
.main-content::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 2px; }

.content-area {
  padding: 32px 32px 48px;
  max-width: 960px;
}

/* Section title */
.page-title {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text); margin-bottom: 24px;
}

/* Stat cards */
.stat-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 28px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 22px;
}

.stat-label {
  font-size: 12px; font-weight: 600; color: var(--text3);
  letter-spacing: 0.3px; text-transform: uppercase;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 28px; font-weight: 700; letter-spacing: -1px;
  color: var(--text); line-height: 1;
  margin-bottom: 4px;
}

.stat-sub { font-size: 12px; color: var(--text3); }

/* Panel card */
.panel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 20px;
}

.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.panel-title {
  font-size: 14px; font-weight: 600; color: var(--text);
}

/* Recharge options */
.recharge-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; padding: 20px;
}

.recharge-item {
  background: var(--surf2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 10px;
  text-align: center;
  position: relative;
  transition: border-color .2s;
}
.recharge-item:hover { border-color: rgba(255,255,255,.2); }
.recharge-item.featured { border-color: rgba(249,115,22,.35); }

.recharge-badge {
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
}

.recharge-amount {
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-bottom: 2px;
}

.recharge-note-text { font-size: 11px; color: var(--text3); }

.recharge-contact {
  padding: 16px 20px;
  font-size: 13px; color: var(--text2); line-height: 1.6;
}

/* Table */
.data-table {
  width: 100%; border-collapse: collapse;
}

.data-table thead tr {
  border-bottom: 1px solid var(--border);
}

.data-table th {
  padding: 12px 20px;
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-align: left; letter-spacing: 0.5px; text-transform: uppercase;
  background: var(--surf2);
}

.data-table td {
  padding: 13px 20px;
  font-size: 13px; color: var(--text2);
  border-bottom: 1px solid var(--border2);
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover td { background: var(--surf2); }

/* Status badges */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px; font-weight: 600;
}

.badge-pending  { background: rgba(255,214,10,.1); color: var(--yellow); }
.badge-process  { background: rgba(10,132,255,.1);  color: var(--blue); }
.badge-success  { background: rgba(52,199,89,.1);   color: var(--green); }
.badge-failed   { background: rgba(255,69,58,.1);   color: var(--red); }
.badge-recharge { background: rgba(52,199,89,.1);   color: var(--green); }
.badge-deduct   { background: rgba(255,255,255,.06); color: var(--text2); }
.badge-refund   { background: rgba(10,132,255,.1);  color: var(--blue); }

/* Empty state */
.empty-state {
  padding: 48px 20px;
  text-align: center;
  color: var(--text3);
  font-size: 14px;
}

/* API keys */
.key-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

.key-item {
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}

.key-info { flex: 1; min-width: 0; }
.key-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.key-value {
  font-family: "SF Mono","Fira Code",monospace;
  font-size: 12px; color: var(--text3);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.key-meta { font-size: 11px; color: var(--text3); margin-top: 3px; }

.key-actions { display: flex; gap: 6px; flex-shrink: 0; }

.btn-sm {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 12px;
  font-size: 12px; font-weight: 500; font-family: var(--font);
  color: var(--text2); cursor: pointer;
  transition: border-color .15s, color .15s;
}
.btn-sm:hover { border-color: rgba(255,255,255,.25); color: var(--text); }
.btn-sm.danger { color: var(--red); border-color: rgba(255,69,58,.25); }
.btn-sm.danger:hover { border-color: rgba(255,69,58,.5); }

.btn-new-key {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 7px 14px;
  font-size: 13px; font-weight: 600; font-family: var(--font);
  cursor: pointer; transition: background .15s;
}
.btn-new-key:hover { background: var(--accent2); }

/* Mono text */
.mono { font-family: "SF Mono","Fira Code",monospace; font-size: 11px; }

/* Amount colors */
.amt-pos { color: var(--green); }
.amt-neg { color: var(--red); }

/* Utilities */
.hidden { display: none !important; }
.section-hidden { display: none; }

/* Link in table */
.tbl-link {
  color: var(--accent); text-decoration: none;
  font-size: 12px; font-weight: 500;
}
.tbl-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- Auth overlay -->
<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">G</div>
      <div class="auth-logo-name">GeminiGen</div>
      <div class="auth-logo-sub">AI 图像生成平台</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" id="tabReg" onclick="switchTab('register')">注册</button>
    </div>

    <!-- Login form -->
    <form id="loginForm" onsubmit="doLogin(event)">
      <input type="email" id="loginEmail" class="auth-input" placeholder="邮箱地址" required>
      <input type="password" id="loginPassword" class="auth-input" placeholder="密码" required>
      <button type="submit" class="auth-submit">登录</button>
    </form>

    <!-- Register form -->
    <form id="registerForm" class="hidden" onsubmit="doRegister(event)">
      <input type="text" id="regUsername" class="auth-input" placeholder="用户名" required>
      <input type="email" id="regEmail" class="auth-input" placeholder="邮箱地址" required>
      <input type="password" id="regPassword" class="auth-input" placeholder="密码（至少 6 位）" required>
      <button type="submit" class="auth-submit">创建账号</button>
    </form>

    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- Main app -->
<div id="mainApp" class="hidden">

  <!-- Header -->
  <header class="app-header">
    <a href="/" class="header-logo">
      <div class="header-logo-icon">G</div>
      <span class="header-logo-name">GeminiGen</span>
    </a>
    <div class="header-right">
      <div class="header-balance">余额：<strong id="headerBalance">¥0.00</strong></div>
      <button class="btn-logout" onclick="doLogout()">退出登录</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <button class="sidebar-item active" id="nav-overview" onclick="showSection('overview')">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>
        概览
      </button>
      <a href="/app/imagen" class="sidebar-item">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><circle cx="5.5" cy="7" r="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1 11l4-3 3 2.5 3-3 4 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        生成图像
      </a>
      <button class="sidebar-item" id="nav-tasks" onclick="showSection('tasks')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        任务记录
      </button>
      <button class="sidebar-item" id="nav-apikeys" onclick="showSection('apikeys')">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="5.5" cy="9" r="3.5" stroke="currentColor" stroke-width="1.3"/><path d="M8.5 6.5l5 5M12 8l1.5 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        API Keys
      </button>
      <button class="sidebar-item" id="nav-transactions" onclick="showSection('transactions')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 5h12M2 8h8M2 11h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/></svg>
        流水记录
      </button>
    </nav>
  </aside>

  <!-- Main content -->
  <div class="main-content">
    <div class="content-area">

      <!-- Overview -->
      <div id="section-overview">
        <div class="page-title">控制台概览</div>

        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">账户余额</div>
            <div class="stat-value" id="balanceDisplay">¥0.00</div>
            <div class="stat-sub">按次扣费，失败自动退款</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">累计任务</div>
            <div class="stat-value" id="totalTasksDisplay">0</div>
            <div class="stat-sub">成功生成的任务数</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">账号邮箱</div>
            <div class="stat-value" id="emailDisplay" style="font-size:16px;letter-spacing:0;">—</div>
            <div class="stat-sub">注册邮箱</div>
          </div>
        </div>

        <div class="panel-card">
          <div class="panel-header">
            <span class="panel-title">充值说明</span>
          </div>
          <div class="recharge-contact">
            如需充值，请联系管理员或扫码转账后提供充值金额与账号邮箱。
          </div>
          <div class="recharge-grid">
            <div class="recharge-item">
              <div class="recharge-amount">¥10</div>
              <div class="recharge-note-text">到账 ¥10</div>
            </div>
            <div class="recharge-item">
              <div class="recharge-amount">¥50</div>
              <div class="recharge-note-text">到账 ¥50</div>
            </div>
            <div class="recharge-item featured">
              <div class="recharge-badge">送 ¥10</div>
              <div class="recharge-amount">¥100</div>
              <div class="recharge-note-text">到账 ¥110</div>
            </div>
            <div class="recharge-item featured">
              <div class="recharge-badge">送 ¥80</div>
              <div class="recharge-amount">¥500</div>
              <div class="recharge-note-text">到账 ¥580</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tasks -->
      <div id="section-tasks" class="section-hidden">
        <div class="page-title">任务记录</div>
        <div class="panel-card">
          <table class="data-table">
            <thead>
              <tr>
                <th>任务 ID</th>
                <th>模型</th>
                <th>状态</th>
                <th>费用</th>
                <th>时间</th>
                <th>结果</th>
              </tr>
            </thead>
            <tbody id="tasksTable">
              <tr><td colspan="6" class="empty-state">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- API Keys -->
      <div id="section-apikeys" class="section-hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
          <div class="page-title" style="margin-bottom:0;">API Keys</div>
          <button class="btn-new-key" onclick="createApiKey()">+ 新建 Key</button>
        </div>
        <div class="panel-card">
          <div class="key-list" id="apiKeysList">
            <div class="empty-state">加载中...</div>
          </div>
        </div>
      </div>

      <!-- Transactions -->
      <div id="section-transactions" class="section-hidden">
        <div class="page-title">流水记录</div>
        <div class="panel-card">
          <table class="data-table">
            <thead>
              <tr>
                <th>类型</th>
                <th>金额</th>
                <th>余额</th>
                <th>备注</th>
                <th>时间</th>
              </tr>
            </thead>
            <tbody id="txTable">
              <tr><td colspan="5" class="empty-state">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('gg_token');
let currentUser = null;
const SECTIONS = ['overview', 'tasks', 'apikeys', 'transactions'];

// ── Init ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (token) {
    try {
      const user = await apiFetch('/auth/me');
      currentUser = user;
      showApp(user);
      return;
    } catch {
      localStorage.removeItem('gg_token');
      token = null;
    }
  }
  showAuthOverlay();
});

function showAuthOverlay() {
  document.getElementById('authOverlay').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
}

function showApp(user) {
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  updateUserDisplay(user);
}

function updateUserDisplay(user) {
  document.getElementById('headerBalance').textContent = '¥' + user.balance.toFixed(4);
  document.getElementById('balanceDisplay').textContent = '¥' + user.balance.toFixed(4);
  document.getElementById('totalTasksDisplay').textContent = user.total_tasks;
  document.getElementById('emailDisplay').textContent = user.email;
}

// ── Auth tabs ─────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabReg').classList.toggle('active', tab === 'register');
  document.getElementById('authError').textContent = '';
}

async function doLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  try {
    const res = await apiFetch('/auth/login', 'POST', { email, password }, false);
    token = res.access_token;
    localStorage.setItem('gg_token', token);
    const user = await apiFetch('/auth/me');
    currentUser = user;
    showApp(user);
  } catch (err) {
    document.getElementById('authError').textContent = err.message || '登录失败';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const username = document.getElementById('regUsername').value;
  const email    = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  try {
    const res = await apiFetch('/auth/register', 'POST', { email, username, password }, false);
    token = res.access_token;
    localStorage.setItem('gg_token', token);
    const user = await apiFetch('/auth/me');
    currentUser = user;
    showApp(user);
  } catch (err) {
    document.getElementById('authError').textContent = err.message || '注册失败';
  }
}

function doLogout() {
  localStorage.removeItem('gg_token');
  token = null;
  currentUser = null;
  showAuthOverlay();
}

// ── Navigation ────────────────────────────────────────────────
function showSection(name) {
  SECTIONS.forEach(s => {
    const sec = document.getElementById('section-' + s);
    if (sec) sec.classList.toggle('section-hidden', s !== name);
    const nav = document.getElementById('nav-' + s);
    if (nav) nav.classList.toggle('active', s === name);
  });
  if (name === 'tasks')        loadTasks();
  if (name === 'apikeys')      loadApiKeys();
  if (name === 'transactions') loadTransactions();
}

// ── Tasks ─────────────────────────────────────────────────────
async function loadTasks() {
  const tbody = document.getElementById('tasksTable');
  tbody.innerHTML = '<tr><td colspan="6" class="empty-state">加载中...</td></tr>';
  try {
    const tasks = await apiFetch('/v1/tasks?limit=50');
    if (!tasks.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无任务记录</td></tr>';
      return;
    }
    tbody.innerHTML = tasks.map(t => `
      <tr>
        <td class="mono" style="color:var(--text3);">${t.task_id.substring(0,8)}...</td>
        <td style="color:var(--text);font-weight:500;">${t.model}</td>
        <td>${statusBadge(t.status)}</td>
        <td>${t.cost ? '<span style="color:var(--text);">¥' + t.cost.toFixed(4) + '</span>' : '—'}</td>
        <td style="color:var(--text3);">${t.created_at.substring(0,16)}</td>
        <td>${t.result_image_url
          ? `<a href="${escHtml(t.result_image_url)}" target="_blank" class="tbl-link">查看图片</a>`
          : (t.error_msg ? `<span style="color:var(--red);font-size:12px;">${escHtml(t.error_msg.substring(0,40))}</span>` : '—')}</td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state" style="color:var(--red);">${escHtml(e.message)}</td></tr>`;
  }
}

function statusBadge(s) {
  const map = {
    pending:    ['badge-pending',  '等待中'],
    processing: ['badge-process',  '处理中'],
    success:    ['badge-success',  '成功'],
    failed:     ['badge-failed',   '失败'],
  };
  const [cls, label] = map[s] || ['badge-deduct', s];
  return `<span class="badge ${cls}">${label}</span>`;
}

// ── API Keys ──────────────────────────────────────────────────
async function loadApiKeys() {
  const container = document.getElementById('apiKeysList');
  container.innerHTML = '<div class="empty-state">加载中...</div>';
  try {
    const keys = await apiFetch('/v1/api-keys');
    if (!keys.length) {
      container.innerHTML = '<div class="empty-state">暂无 API Key，点击右上角新建</div>';
      return;
    }
    container.innerHTML = keys.map(k => `
      <div class="key-item">
        <div class="key-info">
          <div class="key-name">${escHtml(k.key_name)}</div>
          <div class="key-value">${escHtml(k.key_value)}</div>
          <div class="key-meta">调用次数: ${k.total_calls} &nbsp;·&nbsp; 创建: ${k.created_at.substring(0,10)}</div>
        </div>
        <div class="key-actions">
          <button class="btn-sm" onclick="copyKey('${escHtml(k.key_value)}')">复制</button>
          <button class="btn-sm danger" onclick="deleteKey(${k.id})">删除</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = `<div class="empty-state" style="color:var(--red);">${escHtml(e.message)}</div>`;
  }
}

async function createApiKey() {
  const name = prompt('Key 名称（如：production）:', 'default');
  if (!name) return;
  try {
    await apiFetch('/v1/api-keys', 'POST', { key_name: name });
    loadApiKeys();
  } catch (e) { alert('创建失败: ' + e.message); }
}

async function deleteKey(id) {
  if (!confirm('确认删除此 API Key？删除后无法恢复。')) return;
  try {
    await apiFetch('/v1/api-keys/' + id, 'DELETE');
    loadApiKeys();
  } catch (e) { alert('删除失败: ' + e.message); }
}

function copyKey(val) {
  navigator.clipboard.writeText(val)
    .then(() => showToast('已复制到剪贴板'))
    .catch(() => alert(val));
}

// ── Transactions ──────────────────────────────────────────────
async function loadTransactions() {
  const tbody = document.getElementById('txTable');
  tbody.innerHTML = '<tr><td colspan="5" class="empty-state">加载中...</td></tr>';
  try {
    const txs = await apiFetch('/v1/transactions?limit=50');
    if (!txs.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暂无流水记录</td></tr>';
      return;
    }
    const typeLabel = { recharge: '充值', deduct: '扣费', refund: '退款' };
    const typeCls   = { recharge: 'badge-recharge', deduct: 'badge-deduct', refund: 'badge-refund' };
    tbody.innerHTML = txs.map(t => `
      <tr>
        <td><span class="badge ${typeCls[t.type] || 'badge-deduct'}">${typeLabel[t.type] || t.type}</span></td>
        <td class="${t.amount > 0 ? 'amt-pos' : 'amt-neg'}" style="font-weight:600;">
          ${t.amount > 0 ? '+' : ''}¥${Math.abs(t.amount).toFixed(4)}
        </td>
        <td>${t.balance_after != null ? '<span style="color:var(--text);">¥' + Number(t.balance_after).toFixed(4) + '</span>' : '—'}</td>
        <td>${escHtml(t.note || '—')}</td>
        <td style="color:var(--text3);">${t.created_at.substring(0,16)}</td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty-state" style="color:var(--red);">${escHtml(e.message)}</td></tr>`;
  }
}

// ── Toast ──────────────────────────────────────────────────────
function showToast(msg) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.id = 'toast';
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '28px', left: '50%', transform: 'translateX(-50%)',
    background: 'rgba(30,30,30,0.95)', color: '#f5f5f7',
    padding: '10px 20px', borderRadius: '20px',
    fontSize: '13px', fontWeight: '500', zIndex: '999',
    border: '1px solid rgba(255,255,255,0.12)',
    backdropFilter: 'blur(10px)',
  });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2200);
}

// ── API helper ─────────────────────────────────────────────────
async function apiFetch(path, method = 'GET', body = null, useToken = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (useToken && token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

// Escape HTML to prevent XSS
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
