<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 图像生成 — Kewen AI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #000000;
  --surface: #111111;
  --surf2:   #1a1a1a;
  --border:  rgba(255,255,255,0.10);
  --text:    #f5f5f7;
  --text2:   #a1a1a6;
  --accent:  #f97316;
  --accent2: #ea6e10;
  --font:    -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

/* ── Card ── */
.card {
  width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px 36px;
}

.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}

.logo-icon {
  width: 52px; height: 52px;
  background: var(--accent);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #fff;
}

.logo-title {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  line-height: 1.5;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  background: var(--surf2);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 24px;
}

.tab {
  flex: 1;
  padding: 8px 0;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text2);
  transition: all .15s;
  border: none;
  background: transparent;
}

.tab.active {
  background: #2a2a2a;
  color: var(--text);
}

/* ── Form ── */
.field-label {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 6px;
  display: block;
}

.field-wrap {
  margin-bottom: 14px;
}

.field-input {
  width: 100%;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  font-family: var(--font);
  transition: border-color .15s;
}

.field-input:focus {
  border-color: rgba(249,115,22,0.5);
}

.field-input::placeholder { color: var(--text2); }

.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
  transition: background .15s;
  font-family: var(--font);
}

.btn-primary:hover { background: var(--accent2); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }

.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0;
  color: var(--text2);
  font-size: 12px;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.btn-google {
  width: 100%;
  padding: 12px;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  cursor: not-allowed;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--font);
}

.google-icon {
  width: 18px; height: 18px;
}

/* ── Alert ── */
.alert {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 14px;
  display: none;
}

.alert-error {
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.3);
  color: #f87171;
}

.alert-success {
  background: rgba(52,199,89,0.12);
  border: 1px solid rgba(52,199,89,0.3);
  color: #4ade80;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">K</div>
    <div class="logo-title">欢迎使用 Kewen AI</div>
    <div class="logo-sub">登录或注册后即可开始 AI 图像生成</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
    <button class="tab" id="tabReg" onclick="switchTab('reg')">注册</button>
  </div>

  <div id="alert" class="alert"></div>

  <!-- 登录表单 -->
  <div id="formLogin">
    <div class="field-wrap">
      <label class="field-label">邮箱</label>
      <input class="field-input" id="loginEmail" type="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field-wrap">
      <label class="field-label">密码</label>
      <input class="field-input" id="loginPwd" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btnLogin" onclick="doLogin()">登录</button>
    <div class="divider">或</div>
    <button class="btn-google" title="即将推出">
      <svg class="google-icon" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google 登录（即将推出）
    </button>
  </div>

  <!-- 注册表单 -->
  <div id="formReg" style="display:none">
    <div class="field-wrap">
      <label class="field-label">邮箱</label>
      <input class="field-input" id="regEmail" type="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field-wrap">
      <label class="field-label">用户名</label>
      <input class="field-input" id="regUsername" type="text" placeholder="用户名" autocomplete="username">
    </div>
    <div class="field-wrap">
      <label class="field-label">密码</label>
      <input class="field-input" id="regPwd" type="password" placeholder="至少 6 位" autocomplete="new-password">
    </div>
    <button class="btn-primary" id="btnReg" onclick="doRegister()">注册</button>
  </div>
</div>

<script>
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabReg').classList.toggle('active', !isLogin);
  document.getElementById('formLogin').style.display = isLogin ? '' : 'none';
  document.getElementById('formReg').style.display  = isLogin ? 'none' : '';
  hideAlert();
}

function showAlert(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert alert-${type}`;
  el.style.display = 'block';
}

function hideAlert() {
  document.getElementById('alert').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  if (!email || !pwd) { showAlert('请填写邮箱和密码', 'error'); return; }

  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = '登录中...';
  hideAlert();

  try {
    const res  = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd }),
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.detail || '登录失败', 'error'); return; }
    localStorage.setItem('gg_token', data.access_token);
    window.location.replace('/dashboard');
  } catch (e) {
    showAlert('网络错误，请重试', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '登录';
  }
}

async function doRegister() {
  const email    = document.getElementById('regEmail').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const pwd      = document.getElementById('regPwd').value;
  if (!email || !username || !pwd) { showAlert('请填写所有字段', 'error'); return; }
  if (pwd.length < 6) { showAlert('密码至少 6 位', 'error'); return; }

  const btn = document.getElementById('btnReg');
  btn.disabled = true; btn.textContent = '注册中...';
  hideAlert();

  try {
    const res  = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, username, password: pwd }),
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.detail || '注册失败', 'error'); return; }
    localStorage.setItem('gg_token', data.access_token);
    window.location.replace('/dashboard');
  } catch (e) {
    showAlert('网络错误，请重试', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '注册';
  }
}

// 已登录直接跳 dashboard
(async () => {
  const token = localStorage.getItem('gg_token');
  if (!token) return;
  try {
    const res = await fetch('/auth/me', { headers: { Authorization: 'Bearer ' + token } });
    if (res.ok) { window.location.replace('/dashboard'); }
    else { localStorage.removeItem('gg_token'); }
  } catch (_) {}
})();

// Enter 键提交
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('formLogin').style.display !== 'none') doLogin();
  else doRegister();
});
</script>
</body>
</html>
